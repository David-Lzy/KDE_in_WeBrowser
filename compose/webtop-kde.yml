---
services:
  webtop-kde:
    image: kde-webtop:wechat-qq
    build:
      context: ..
      dockerfile: modules/wechat-qq/Dockerfile
      args:
        INSTALL_WECHAT: "${INSTALL_WECHAT:-true}"
        INSTALL_QQ: "${INSTALL_QQ:-true}"
        INSTALL_PCMANFM: "${INSTALL_PCMANFM:-true}"
    container_name: "${CONTAINER_NAME:-kde-webtop}"
    expose:
      - "3000"
      - "3001"
    restart: unless-stopped
    volumes:
      - "${HOST_HOME:?set HOST_HOME or run scripts/detect-host-user.sh}:/config"
      - "../custom-cont-init.d:/custom-cont-init.d:ro"
      - "${WECHAT_PROFILE_DIR:-../data/wechat/.xwechat}:/config/.xwechat"
      - "${WECHAT_FILES_DIR:-../data/wechat/xwechat_files}:/wechat-xwechat-files"
      - "${QQ_DATA_DIR:-../data/qq/Tencent Files}:/config/Tencent Files"
    devices:
      - "${DRI_DEVICE:-/dev/dri}:/dev/dri"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    runtime: nvidia
    gpus: all
    shm_size: "${SHM_SIZE:-2gb}"
    environment:
      PUID: "${HOST_UID:-1000}"
      PGID: "${HOST_GID:-1000}"
      HOST_USER: "${HOST_USER:-davidli}"
      HOST_UID: "${HOST_UID:-1000}"
      HOST_GID: "${HOST_GID:-1000}"
      HOST_HOME: "${HOST_HOME:-/home/davidli}"
      CONTAINER_USER: "${CONTAINER_USER:-docker_davidli}"
      TZ: "${TZ:-Australia/Adelaide}"
      LANG: "${WEBTOP_LANG:-zh_CN.UTF-8}"
      LANGUAGE: "${WEBTOP_LANGUAGE:-zh_CN}"
      LC_ALL: "${WEBTOP_LC_ALL:-zh_CN.UTF-8}"
      TITLE: "${TITLE:-KDE in Web Browser}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-all}"
      PIXELFLUX_WAYLAND: "${PIXELFLUX_WAYLAND:-true}"
      AUTO_GPU: "${AUTO_GPU:-true}"
      DRINODE: "${DRINODE:-/dev/dri/renderD128}"
      DRI_NODE: "${DRI_NODE:-/dev/dri/renderD128}"
      SELKIES_CLIPBOARD_ENABLED: "${SELKIES_CLIPBOARD_ENABLED:-true}"
      SELKIES_CLIPBOARD_IN_ENABLED: "${SELKIES_CLIPBOARD_IN_ENABLED:-true}"
      SELKIES_CLIPBOARD_OUT_ENABLED: "${SELKIES_CLIPBOARD_OUT_ENABLED:-true}"
      SELKIES_ENABLE_BINARY_CLIPBOARD: "${SELKIES_ENABLE_BINARY_CLIPBOARD:-true}"
      SELKIES_COMMAND_ENABLED: "${SELKIES_COMMAND_ENABLED:-true}"
      SELKIES_USE_CSS_SCALING: "${SELKIES_USE_CSS_SCALING:-false}"
      SELKIES_FORCE_ALIGNED_RESOLUTION: "${SELKIES_FORCE_ALIGNED_RESOLUTION:-true}"
      SELKIES_SCALING_DPI: "${SELKIES_SCALING_DPI:-96,120,144,168,192,216,240,264,288}"
      SELKIES_ENCODER: "${SELKIES_ENCODER:-x264enc,jpeg}"
      SELKIES_FRAMERATE: "${SELKIES_FRAMERATE:-8-60}"
      SELKIES_VIDEO_BITRATE: "${SELKIES_VIDEO_BITRATE:-8}"
      SELKIES_RATE_CONTROL_MODE: "${SELKIES_RATE_CONTROL_MODE:-cbr}"
      SELKIES_ENABLE_RATE_CONTROL: "${SELKIES_ENABLE_RATE_CONTROL:-true}"
      SELKIES_H264_CRF: "${SELKIES_H264_CRF:-18-35}"
      SELKIES_JPEG_QUALITY: "${SELKIES_JPEG_QUALITY:-80}"
      SELKIES_AUDIO_BITRATE: "${SELKIES_AUDIO_BITRATE:-128000}"
      SELKIES_USE_PAINT_OVER_QUALITY: "${SELKIES_USE_PAINT_OVER_QUALITY:-true}"
      SELKIES_PAINT_OVER_JPEG_QUALITY: "${SELKIES_PAINT_OVER_JPEG_QUALITY:-90}"
      SELKIES_H264_PAINTOVER_CRF: "${SELKIES_H264_PAINTOVER_CRF:-18-28}"
      SELKIES_H264_PAINTOVER_BURST_FRAMES: "${SELKIES_H264_PAINTOVER_BURST_FRAMES:-5}"
      ENABLE_XWAYLAND_CLIPBOARD_BRIDGE: "${ENABLE_XWAYLAND_CLIPBOARD_BRIDGE:-true}"
      ENABLE_AUTO_HIDPI_DPI: "${ENABLE_AUTO_HIDPI_DPI:-true}"
      ENABLE_TERMINAL_INTEGRATION: "${ENABLE_TERMINAL_INTEGRATION:-true}"
      ENABLE_WECHAT_QQ_MODULE: "${ENABLE_WECHAT_QQ_MODULE:-true}"
      AUTO_START_WECHAT: "${AUTO_START_WECHAT:-false}"
      AUTO_START_QQ: "${AUTO_START_QQ:-false}"
      HOST_SSH_HOST: "${HOST_SSH_HOST:-host.docker.internal}"
      HOST_SSH_PORT: "${HOST_SSH_PORT:-22}"
      HOST_SSH_TARGET: "${HOST_SSH_TARGET:-}"
      ENABLE_THEME_SYNC: "${ENABLE_THEME_SYNC:-true}"
      THEME_SYNC_LIGHT_SCHEME: "${THEME_SYNC_LIGHT_SCHEME:-BreezeLight}"
      THEME_SYNC_DARK_SCHEME: "${THEME_SYNC_DARK_SCHEME:-BreezeDark}"
      THEME_SYNC_LIGHT_LOOK_AND_FEEL: "${THEME_SYNC_LIGHT_LOOK_AND_FEEL:-org.kde.breeze.desktop}"
      THEME_SYNC_DARK_LOOK_AND_FEEL: "${THEME_SYNC_DARK_LOOK_AND_FEEL:-org.kde.breezedark.desktop}"

  authelia:
    image: "authelia/authelia:${AUTHELIA_VERSION:-4.39.20}"
    restart: unless-stopped
    expose:
      - "9091"
    command:
      - authelia
      - --config
      - /config/configuration.yml
    environment:
      TZ: "${TZ:-Australia/Adelaide}"
    volumes:
      - "${AUTHELIA_CONFIG_DIR:-../data/authelia}:/config"

  gateway-nginx:
    image: nginx:mainline-alpine
    restart: unless-stopped
    depends_on:
      - authelia
      - webtop-kde
    expose:
      - "8080"
      - "8443"
    ports:
      - "${GATEWAY_BIND:-127.0.0.1}:${GATEWAY_PORT:-18080}:8443"
    volumes:
      - "../gateway/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro"
      - "${GATEWAY_TLS_CERT:-../ssl/kde-webtop.crt}:/etc/nginx/certs/kde-webtop.crt:ro"
      - "${GATEWAY_TLS_KEY:-../ssl/kde-webtop.key}:/etc/nginx/certs/kde-webtop.key:ro"

  frpc:
    image: snowdreamtech/frpc:nightly
    profiles:
      - frpc
    restart: unless-stopped
    depends_on:
      - gateway-nginx
    volumes:
      - "../modules/frpc/frpc.toml:/etc/frp/frpc.toml:ro"
